name: Midnight dApp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-js-version: '18.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci || npm install

    - name: Run Midnight Compliance Tests
      run: npx vitest run src/contract.test.ts
